<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQW // SYSTEM BREACH</title>
    
    <!-- Font & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* --- CYBERPUNK GLITCH THEME --- */
        :root {
            --bg-body: #0a0a0f;
            --bg-card: #0f0f1a;
            --text-main: #e0e0e0;
            --text-muted: #6b7280;
            --primary: #00ff41;
            --primary-dark: #00cc33;
            --accent: #ff003c;
            --accent2: #0ff;
            --border: #1a1a2e;
            --shadow: 0 0 15px rgba(0, 255, 65, 0.1);
            --radius: 4px;
            --glow-primary: 0 0 10px rgba(0,255,65,0.5), 0 0 20px rgba(0,255,65,0.2);
            --glow-accent: 0 0 10px rgba(255,0,60,0.5), 0 0 20px rgba(255,0,60,0.2);
        }

        [data-theme="light"] {
            --bg-body: #e8e8e8;
            --bg-card: #ffffff;
            --text-main: #111;
            --text-muted: #555;
            --border: #ccc;
            --shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-bottom: 80px;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== SCANLINE OVERLAY ===== */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(0, 255, 65, 0.03) 2px, rgba(0, 255, 65, 0.03) 4px
            );
            pointer-events: none;
            z-index: 9998;
        }

        /* ===== NOISE OVERLAY ===== */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9997;
            opacity: 0.5;
        }

        /* ===== GLITCH KEYFRAMES ===== */
        @keyframes glitch1 {
            0%, 100% { clip-path: inset(40% 0 61% 0); transform: translate(-2px, 2px); }
            20% { clip-path: inset(92% 0 1% 0); transform: translate(1px, -3px); }
            40% { clip-path: inset(43% 0 1% 0); transform: translate(-1px, 3px); }
            60% { clip-path: inset(25% 0 58% 0); transform: translate(3px, 1px); }
            80% { clip-path: inset(54% 0 7% 0); transform: translate(-3px, -2px); }
        }
        @keyframes glitch2 {
            0%, 100% { clip-path: inset(65% 0 13% 0); transform: translate(2px, -1px); }
            20% { clip-path: inset(15% 0 62% 0); transform: translate(-3px, 2px); }
            40% { clip-path: inset(78% 0 1% 0); transform: translate(2px, -3px); }
            60% { clip-path: inset(2% 0 85% 0); transform: translate(-1px, 1px); }
            80% { clip-path: inset(35% 0 50% 0); transform: translate(3px, 3px); }
        }
        @keyframes glitchSkew {
            0%, 100% { transform: skew(0deg); }
            20% { transform: skew(-2deg); }
            40% { transform: skew(0.5deg); }
            60% { transform: skew(-0.5deg); }
            80% { transform: skew(1deg); }
        }
        @keyframes flicker {
            0%, 100% { opacity: 1; } 92% { opacity: 1; }
            93% { opacity: 0.8; } 94% { opacity: 1; }
            96% { opacity: 0.6; } 97% { opacity: 1; }
        }
        @keyframes scanMove { 0% { top: -10%; } 100% { top: 110%; } }
        @keyframes textShadow {
            0%, 100% { text-shadow: 2px 0 var(--accent), -2px 0 var(--accent2); }
            25% { text-shadow: -2px 0 var(--accent), 2px 0 var(--accent2); }
            50% { text-shadow: 2px 2px var(--accent), -2px -2px var(--accent2); }
            75% { text-shadow: -2px -1px var(--accent), 2px 1px var(--accent2); }
        }
        @keyframes popUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes dataStream { 0% { transform: translateY(-100%); } 100% { transform: translateY(100vh); } }
        @keyframes cursorBlink { 0%, 100% { border-right-color: var(--primary); } 50% { border-right-color: transparent; } }

        /* ===== MATRIX CANVAS ===== */
        #matrixCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.15; }

        /* ===== SCANNING LINE ===== */
        .scan-line {
            position: fixed; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            box-shadow: 0 0 20px var(--primary), 0 0 60px var(--primary);
            z-index: 9996; pointer-events: none;
            animation: scanMove 4s linear infinite; opacity: 0.4;
        }

        /* ===== GENERAL ===== */
        a { text-decoration: none; color: inherit; }
        img { max-width: 100%; display: block; }
        button { cursor: pointer; border: none; font-family: 'Share Tech Mono', monospace; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; position: relative; z-index: 2; }

        /* ===== HEADER ===== */
        header {
            background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(10px);
            padding: 1rem 0; position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--primary); box-shadow: 0 2px 20px rgba(0,255,65,0.15);
        }
        .nav-wrapper { display: flex; justify-content: space-between; align-items: center; }
        .logo {
            font-size: 1.5rem; font-weight: 700; color: var(--primary);
            text-shadow: 0 0 10px rgba(0,255,65,0.5); letter-spacing: 3px; position: relative;
        }
        .logo::before { content: '> '; color: var(--accent); animation: flicker 3s infinite; }
        .logo::after { content: ' _'; border-right: 2px solid var(--primary); animation: cursorBlink 1s infinite; margin-left: 2px; }
        
        .search-wrapper { flex: 1; max-width: 400px; margin: 0 2rem; position: relative; display: none; }
        .search-input {
            width: 100%; padding: 10px 15px 10px 40px; border-radius: var(--radius);
            border: 1px solid var(--border); background: rgba(0,0,0,0.5);
            color: var(--primary); outline: none; font-family: 'Share Tech Mono', monospace; font-size: 0.9rem;
        }
        .search-input::placeholder { color: #333; }
        .search-input:focus { border-color: var(--primary); box-shadow: var(--glow-primary); }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--primary); }

        .nav-actions { display: flex; align-items: center; gap: 15px; }
        .icon-btn { background: none; font-size: 1.5rem; color: var(--primary); padding: 5px; position: relative; transition: all 0.2s; }
        .icon-btn:hover { text-shadow: var(--glow-primary); transform: scale(1.1); }
        .badge {
            position: absolute; top: -2px; right: -4px; background: var(--accent); color: white;
            font-size: 0.65rem; width: 18px; height: 18px; border-radius: 0;
            display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: var(--glow-accent);
        }

        /* ===== HERO ===== */
        .hero {
            position: relative; background: transparent; color: var(--primary);
            padding: 5rem 1rem; text-align: center; margin-bottom: 2rem;
            overflow: hidden; border: 1px solid var(--border); border-radius: var(--radius);
            animation: flicker 5s infinite;
        }

        /* --- LAYER UNTUK GIF --- */
        .hero-gif-layer {
            position: absolute; inset: 0;
            background-size: cover; background-position: center;
            z-index: 0; transform: translateZ(0);
        }
        .hero-overlay-gif {
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(10,10,15,0.85) 0%, rgba(0,255,65,0.15) 100%);
            z-index: 1;
        }
        /* ------------------------- */

        .hero-content { position: relative; z-index: 2; }
        .hero h1 {
            font-size: 3rem; margin-bottom: 0.5rem; position: relative; display: inline-block;
            animation: textShadow 3s infinite, glitchSkew 5s infinite; letter-spacing: 5px; text-transform: uppercase;
        }
        .hero h1::before, .hero h1::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        .hero h1::before { color: var(--accent); animation: glitch1 2s infinite linear alternate-reverse; z-index: -1; }
        .hero h1::after { color: var(--accent2); animation: glitch2 3s infinite linear alternate-reverse; z-index: -2; }
        .hero p { color: var(--text-muted); font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; }

        .hero::before, .hero::after {
            content: ''; position: absolute; width: 30px; height: 30px; border: 2px solid var(--primary); z-index: 5;
        }
        .hero::before { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .hero::after { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        /* ===== CATEGORIES ===== */
        .categories { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 2rem; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .chip {
            padding: 8px 16px; white-space: nowrap; font-size: 0.85rem;
            background: transparent; border: 1px solid var(--border); cursor: pointer;
            color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s;
        }
        .chip:hover { border-color: var(--primary); color: var(--primary); }
        .chip.active { background: var(--primary); color: #000; border-color: var(--primary); box-shadow: var(--glow-primary); font-weight: 700; }

        /* ===== MOBILE SEARCH ===== */
        .mobile-search { display: block; padding: 0 1rem 1rem 1rem; }
        .mobile-search input {
            width: 100%; padding: 12px; border-radius: var(--radius); border: 1px solid var(--border);
            background: rgba(0,0,0,0.5); color: var(--primary); font-family: 'Share Tech Mono', monospace;
        }

        /* ===== PRODUCT GRID ===== */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; padding-bottom: 2rem; }
        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; }
            .search-wrapper { display: block; }
            .mobile-search { display: none; }
            .hero h1 { font-size: 4rem; }
        }

        /* ===== CARD ===== */
        .card {
            background: var(--bg-card); border-radius: var(--radius); overflow: hidden;
            position: relative; cursor: pointer; border: 1px solid var(--border); transition: all 0.3s;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 0;
            background: var(--primary); box-shadow: var(--glow-primary); transition: height 0.3s; z-index: 2;
        }
        .card:hover::before { height: 100%; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: var(--glow-primary); }
        .card-img { width: 100%; height: 180px; object-fit: cover; background: #111; filter: saturate(0.7); transition: filter 0.3s; }
        .card:hover .card-img { filter: saturate(1); }
        .card-body { padding: 1rem; }
        .card-category { font-size: 0.65rem; text-transform: uppercase; color: var(--accent); letter-spacing: 2px; margin-bottom: 5px; }
        .card-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.5rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'Poppins', sans-serif; }
        .card-price { color: var(--primary); font-weight: 700; font-size: 1.1rem; margin-bottom: 0.5rem; text-shadow: 0 0 8px rgba(0,255,65,0.3); }
        .btn-quick-add {
            width: 100%; padding: 8px; background: transparent; color: var(--primary); border: 1px solid var(--primary);
            border-radius: var(--radius); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; transition: all 0.2s;
        }
        .btn-quick-add:hover { background: var(--primary); color: #000; box-shadow: var(--glow-primary); }

        /* ===== MODALS ===== */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; display: none; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(8px); }
        .modal-overlay.open { display: flex; }
        .modal-content {
            background: var(--bg-card); width: 100%; max-width: 800px; border-radius: var(--radius);
            overflow: hidden; position: relative; max-height: 90vh; overflow-y: auto;
            animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid var(--primary); box-shadow: var(--glow-primary);
        }
        .modal-grid { display: grid; grid-template-columns: 1fr; }
        @media(min-width: 768px) { .modal-grid { grid-template-columns: 1fr 1fr; } }
        .modal-img { width: 100%; height: 300px; object-fit: cover; }
        @media(min-width: 768px) { .modal-img { height: 100%; } }
        .modal-details { padding: 2rem; font-family: 'Poppins', sans-serif; }
        .modal-close {
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); color: var(--primary);
            border: 1px solid var(--primary); width: 35px; height: 35px; border-radius: var(--radius);
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem; z-index: 10;
        }
        .modal-close:hover { background: var(--accent); color: white; border-color: var(--accent); }

        /* ===== CART ===== */
        .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 400; display: none; justify-content: flex-end; backdrop-filter: blur(5px); }
        .cart-overlay.open { display: flex; }
        .cart-sidebar { width: 100%; max-width: 400px; background: var(--bg-card); height: 100%; display: flex; flex-direction: column; border-left: 1px solid var(--primary); box-shadow: -5px 0 30px rgba(0,255,65,0.1); }
        .cart-items { flex: 1; overflow-y: auto; padding: 1.5rem; }
        .cart-item { display: flex; gap: 1rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        .cart-item img { width: 60px; height: 60px; border-radius: var(--radius); object-fit: cover; border: 1px solid var(--border); }
        .cart-controls { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
        .qty-btn { width: 28px; height: 28px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; color: var(--primary); font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .qty-btn:hover { border-color: var(--primary); box-shadow: var(--glow-primary); }
        .btn-primary { background: var(--primary); color: #000; padding: 12px 20px; border-radius: var(--radius); font-weight: 700; width: 100%; text-align: center; text-transform: uppercase; letter-spacing: 2px; transition: all 0.2s; }
        .btn-primary:hover { box-shadow: var(--glow-primary); transform: translateY(-2px); }
        .btn-wa { background: #25D366; color: white; display: inline-flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; margin-top: 1rem; }
        .btn-wa:hover { box-shadow: 0 0 20px rgba(37,211,102,0.5); }

        /* ===== BOTTOM NAV ===== */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10,10,15,0.95); border-top: 1px solid var(--primary); display: none; justify-content: space-around; padding: 10px 0; z-index: 90; backdrop-filter: blur(10px); box-shadow: 0 -5px 20px rgba(0,255,65,0.1); }
        .bottom-nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; color: var(--text-muted); gap: 3px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .bottom-nav-item.active { color: var(--primary); text-shadow: var(--glow-primary); }
        @media(max-width: 768px) { .bottom-nav { display: flex; } body { padding-bottom: 70px; } }

        /* ===== DATA STREAM DECORATION ===== */
        .data-stream { position: fixed; top: 0; width: 1px; background: linear-gradient(180deg, transparent, var(--primary), transparent); z-index: 1; pointer-events: none; opacity: 0.3; }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>
    <div class="scan-line"></div>

    <div class="data-stream" style="left:10%; height:30vh; animation: dataStream 7s linear infinite;"></div>
    <div class="data-stream" style="left:25%; height:20vh; animation: dataStream 11s linear infinite 2s;"></div>
    <div class="data-stream" style="left:70%; height:25vh; animation: dataStream 9s linear infinite 4s;"></div>
    <div class="data-stream" style="left:90%; height:35vh; animation: dataStream 8s linear infinite 1s;"></div>

    <header>
        <div class="container nav-wrapper">
            <a href="#" class="logo">AQW</a>
            <div class="search-wrapper">
                <i class="ph ph-magnifying-glass search-icon"></i>
                <input type="text" class="search-input" placeholder="> search_query..." oninput="filterProducts(this.value)">
            </div>
            <div class="nav-actions">
                <button class="icon-btn" onclick="toggleTheme()" title="Toggle Theme">
                    <i class="ph ph-bulb-filament" id="themeIcon"></i>
                </button>
                <button class="icon-btn" onclick="toggleCart()">
                    <i class="ph ph-shopping-cart"></i>
                    <span class="badge" id="cartCount">0</span>
                </button>
            </div>
        </div>
    </header>

    <div class="mobile-search">
        <input type="text" placeholder="> search_query..." oninput="filterProducts(this.value)">
    </div>

    <main class="container">
        <!-- Hero -->
        <section class="hero" id="heroSection">
            <!-- 
                ==========================================
                GANTI TEKS "PASTE_LINK_GIF_DISINI" DI BAWAH 
                DENGAN URL GIF ANDA DARI GOOGLE/WEB
                ==========================================
            -->
            <div class="hero-gif-layer" style="background-image: url('https://media3.giphy.com/media/v1.Y2lkPTZjMDliOTUyc3JwbjdoNW5mcjFtaTFtaDBkbmRpZW85dm1iYXR5aWllMnJtM3NqYSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/z2D26GunfUK1W/giphy.gif');"></div>
            
            <div class="hero-overlay-gif"></div>
            
            <div class="hero-content">
                <h1 data-text="Toko Akiwot">Toko Akiwot</h1>
                <p>// koleksi_eksklusif.hack</p>
            </div>
        </section>

        <div class="categories" id="categoryContainer">
            <button class="chip active" onclick="filterCategory('all')">// ALL</button>
        </div>

        <div class="product-grid" id="productGrid">
            <div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: var(--primary);">
                > LOADING_DATABASE_<span style="animation: cursorBlink 1s infinite;">_</span>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeDetail()">[X]</button>
            <div class="modal-grid">
                <img src="" id="detailImg" class="modal-img">
                <div class="modal-details">
                    <div style="font-size:0.7rem; color:var(--accent); letter-spacing:2px; margin-bottom:5px;">// ITEM_DATA</div>
                    <h2 id="detailName" style="font-size:1.5rem; margin-bottom:0.5rem; color:var(--primary);">Nama Produk</h2>
                    <h3 id="detailPrice" style="color:var(--primary); font-size:1.5rem; margin-bottom:1rem; text-shadow: var(--glow-primary);">Rp 0</h3>
                    <p id="detailDesc" style="color:var(--text-muted); margin-bottom:2rem; line-height:1.6;">Deskripsi lengkap produk ada di sini.</p>
                    <button class="btn-primary" onclick="addToCartFromDetail()">+ ADD_TO_CART</button>
                </div>
            </div>
        </div>
    </div>

    <div class="cart-overlay" id="cartOverlay">
        <div class="cart-sidebar">
            <div style="padding:1.5rem; border-bottom:1px solid var(--primary); display:flex; justify-content:space-between; align-items:center;">
                <h3 style="color:var(--primary);">// CART</h3>
                <button onclick="toggleCart()" style="background:none; font-size:1.5rem; color:var(--accent);">[X]</button>
            </div>
            <div class="cart-items" id="cartItems"></div>
            <div style="padding:1.5rem; border-top:1px solid var(--primary); background:rgba(0,0,0,0.3);">
                <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.2rem; margin-bottom:1rem;">
                    <span style="color:var(--text-muted);">TOTAL:</span>
                    <span id="cartTotal" style="color:var(--primary); text-shadow:var(--glow-primary);">Rp 0</span>
                </div>
                <button class="btn-primary" onclick="openCheckout()">CHECKOUT</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="checkoutModal">
        <div class="modal-content" style="max-width:500px;">
            <button class="modal-close" onclick="closeCheckout()">[X]</button>
            <div style="padding:2rem;">
                <div style="font-size:0.7rem; color:var(--accent); letter-spacing:2px; margin-bottom:5px;">// CHECKOUT_PROTOCOL</div>
                <h2 style="margin-bottom:1.5rem; color:var(--primary);">CHECKOUT</h2>
                <form id="orderForm" onsubmit="handleOrder(event)">
                    <div style="margin-bottom:1rem;">
                        <label style="font-size:0.8rem; color:var(--primary);">NAMA</label>
                        <input type="text" id="custName" class="search-input" style="border-radius:var(--radius); width:100%;" required>
                    </div>
                    <div style="margin-bottom:1rem;">
                        <label style="font-size:0.8rem; color:var(--primary);">WHATSAPP</label>
                        <input type="tel" id="custPhone" class="search-input" style="border-radius:var(--radius); width:100%;" required>
                    </div>
                    <div style="margin-bottom:1rem;">
                        <label style="font-size:0.8rem; color:var(--primary);">ALAMAT</label>
                        <input type="text" id="custAddress" class="search-input" style="border-radius:var(--radius); width:100%;" required>
                    </div>
                    <label style="font-size:0.8rem; color:var(--primary); display:block; margin-bottom:5px;">PAYMENT_METHOD</label>
                    <div style="border:1px solid var(--border); padding:10px; border-radius:var(--radius); margin-bottom:10px; cursor:pointer;" onclick="selectPay('qris', 'QRIS')">
                        <input type="radio" name="pay" id="payQris"> <label for="payQris" style="color:var(--text-main);">[QRIS] Scan</label>
                        <div id="viewQris" style="display:none; margin-top:5px;"><img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=PAYMENT" style="width:100px;"></div>

                    <div style="border:1px solid var(--border); padding:10px; border-radius:var(--radius); margin-bottom:20px; cursor:pointer;" onclick="selectPay('bank', 'TRANSFER')">

                    <p style="color:var(--text-muted); font-size:0.8rem;">Check email admin & send proof via WA</p>
                    <a href="#" id="waLink" class="btn-primary btn-wa" target="_blank">
                        <i class="ph ph-whatsapp-logo" style="font-size:1.2rem;"></i> SEND_PROOF
                    </a>
                </div>
            </div>
        </div>

        <div class="bottom-nav-item active" onclick="window.scrollTo(0,0)">
            <i class="ph ph-house" style="font-size:1.5rem;"></i><span>HOME</span>
        </div>
        <div class="bottom-nav-item" onclick="toggleCart()">
            <i class="ph ph-shopping-cart" style="font-size:1.5rem;"></i><span>CART</span>
        </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF';
        const fontSize = 14;
        const columns = Math.floor(canvas.width / fontSize);
        const drops = Array(columns).fill(1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(10, 10, 15, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff41';
            ctx.font = fontSize + 'px Share Tech Mono';
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXKeIOlD8r0xNM61pzh82og0DBQvlnxEk",
            authDomain: "fire-me-a2f00.firebaseapp.com",
            databaseURL: "https://fire-me-a2f00-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "fire-me-a2f00",
            storageBucket: "fire-me-a2f00.firebasestorage.app",
            messagingSenderId: "1010150322376",
            appId: "1:1010150322376:web:625ab284498f3e2bea75fd",
            measurementId: "G-T2ZFHHPT5N"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.allProducts = []; 
        window.allCategories = [];

        onValue(ref(db, 'categories'), (snapshot) => {
            const container = document.getElementById('categoryContainer');
            while (container.children.length > 1) container.removeChild(container.lastChild);
            if (snapshot.exists()) {
                const cats = Object.values(snapshot.val()).map(c => c.name);
                window.allCategories = cats;
                cats.forEach(catName => {
                    const btn = document.createElement('button');
                    btn.className = 'chip';
                    btn.innerText = '// ' + catName.toUpperCase();
                    btn.onclick = () => window.filterCategory(catName);
                    container.appendChild(btn);
                });
            }
        });

        onValue(ref(db, 'products'), (snapshot) => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            window.allProducts = []; 
            if (!snapshot.exists()) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:2rem; color:var(--accent);">> NO_DATA_FOUND</div>';
                return;
            }
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                data.id = childSnapshot.key;
                window.allProducts.push(data);
            });
            window.renderProducts(window.allProducts);
        });

        window.formatRupiah = (num) => "Rp " + num.toLocaleString('id-ID');

        window.renderProducts = (list) => {
            const grid = document.getElementById('productGrid');
            if (list.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:2rem; color:var(--accent);">> NO_RESULTS</div>';
                return;
            }
            grid.innerHTML = list.map((p, i) => `
                <div class="card" onclick="openDetail('${p.id}')" style="animation: popUp 0.3s ease-out ${i * 0.05}s both;">
                    <img src="${p.imageUrl}" class="card-img" onerror="this.src='https://via.placeholder.com/200/111/00ff41?text=NO_IMG'">
                    <div class="card-body">
                        <div class="card-category">${p.category}</div>
                        <div class="card-title">${p.name}</div>
                        <div class="card-price">${window.formatRupiah(p.price)}</div>
                        <button class="btn-quick-add" onclick="event.stopPropagation(); window.addToCart('${p.id}')">+ ADD_CART</button>
                    </div>
                </div>
            `).join('');
        };

        window.filterCategory = (cat) => {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            if(cat === 'all') window.renderProducts(window.allProducts);
            else window.renderProducts(window.allProducts.filter(p => p.category === cat));
        };

        window.filterProducts = (keyword) => {
            keyword = keyword.toLowerCase();
            const filtered = window.allProducts.filter(p => p.name.toLowerCase().includes(keyword));
            window.renderProducts(filtered);
        };
    </script>

    <script>
        emailjs.init("16r4SQoMxpaUBZUzF"); 
        const SERVICE_ID = "service_sqpll1s";
        const TEMPLATE_ID = "template_jsf6l9v";
        const ADMIN_WA = "6281234567890";
        let cart = [];
        let currentDetailId = null;
        let selectedPayment = "";

        window.openDetail = (id) => {
            const p = window.allProducts.find(x => x.id === id);
            if(!p) return;
            currentDetailId = id;
            document.getElementById('detailImg').src = p.imageUrl;
            document.getElementById('detailName').innerText = p.name;
            document.getElementById('detailPrice').innerText = window.formatRupiah(p.price);
            document.getElementById('detailDesc').innerText = p.desc || "NO_DESCRIPTION_AVAILABLE";
            document.getElementById('detailModal').classList.add('open');
        };
        window.closeDetail = () => document.getElementById('detailModal').classList.remove('open');
        window.addToCartFromDetail = () => { window.addToCart(currentDetailId); closeDetail(); };

        window.addToCart = (id) => {
            const p = window.allProducts.find(x => x.id === id);
            if(!p) return;
            const exist = cart.find(x => x.id === id);
            if(exist) { exist.qty++; } else { cart.push({...p, qty:1}); }
            updateCart();
            showToast('CART: +1_ITEM');
        };
        window.changeQty = (id, delta) => {
            const item = cart.find(x => x.id === id);
            if(!item) return;
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(x => x.id !== id);
            updateCart();
        };
        window.updateCart = () => {
            const total = cart.reduce((a,b) => a + (b.price * b.qty), 0);
            const count = cart.reduce((a,b) => a + b.qty, 0);
            document.getElementById('cartCount').innerText = count;
            document.getElementById('cartTotal').innerText = window.formatRupiah(total);
            const list = document.getElementById('cartItems');
            if(cart.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:var(--text-muted); padding-top:20px;">> CART_EMPTY</p>';
            } else {
                list.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <img src="${item.imageUrl}">
                        <div style="flex:1;">
                            <div style="font-weight:600; color:var(--primary);">${item.name}</div>
                            <div style="font-size:0.9rem; color:var(--text-muted); margin-bottom:5px;">${window.formatRupiah(item.price)}</div>
                            <div class="cart-controls">
                                <button class="qty-btn" onclick="changeQty('${item.id}', -1)">-</button>
                                <span style="color:var(--primary);">${item.qty}</span>
                                <button class="qty-btn" onclick="changeQty('${item.id}', 1)">+</button>
                            </div>
                        </div>
                        <div style="font-weight:bold; text-align:right;">
                            <div style="color:var(--primary);">${window.formatRupiah(item.price * item.qty)}</div>
                            <button onclick="changeQty('${item.id}', -${item.qty})" style="color:var(--accent); font-size:0.75rem; margin-top:5px; background:none; text-decoration:underline;">DEL</button>
                        </div>
                    </div>
                `).join('');
            }
        };
        window.toggleCart = () => document.getElementById('cartOverlay').classList.toggle('open');

        window.openCheckout = () => {
            if(!cart.length) return showToast('ERROR: CART_EMPTY');
            toggleCart();
            document.getElementById('checkoutModal').classList.add('open');
            document.getElementById('orderForm').style.display = 'block';
            document.getElementById('loadView').style.display = 'none';
            document.getElementById('successView').style.display = 'none';
        };
        window.closeCheckout = () => document.getElementById('checkoutModal').classList.remove('open');
        window.selectPay = (type, name) => {
            selectedPayment = name;
            document.getElementById('payQris').checked = (type === 'qris');
            document.getElementById('payBank').checked = (type === 'bank');
            document.getElementById('viewQris').style.display = (type === 'qris') ? 'block' : 'none';
        };
        window.handleOrder = (e) => {
            e.preventDefault();
            if(!selectedPayment) return showToast('ERROR: SELECT_PAYMENT');
            document.getElementById('orderForm').style.display = 'none';
            document.getElementById('loadView').style.display = 'block';
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddress').value;
            const total = document.getElementById('cartTotal').innerText;
            let items = cart.map(i => `- ${i.name} (${i.qty}x) : ${window.formatRupiah(i.price*i.qty)}`).join('\n');
            const params = { to_name: "Admin AQW", from_name: name, customer_phone: phone, customer_address: address, message: items + `\nTotal: ${total}\nMetode: ${selectedPayment}` };
            emailjs.send(SERVICE_ID, TEMPLATE_ID, params)
                .then(() => showSuccess(name, phone, address, items, total, selectedPayment))
                .catch((err) => { console.error(err); showSuccess(name, phone, address, items, total, selectedPayment); });
        };
        window.showSuccess = (name, phone, address, items, total, method) => {
            document.getElementById('loadView').style.display = 'none';
            document.getElementById('successView').style.display = 'block';
            let waText = `Halo Admin, saya ${name} pesan.%0A%0A${items.replace(/\n/g, '%0A')}%0A%0ATotal: ${total}%0AMetode: ${method}%0AAlamat: ${address}.%0A%0ABukti bayar:`;
            document.getElementById('waLink').href = `https://wa.me/${ADMIN_WA}?text=${waText}`;
        };

        window.toggleTheme = () => {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') !== 'light';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('themeIcon').className = isDark ? 'ph ph-bulb-filament' : 'ph ph-moon';
            document.getElementById('matrixCanvas').style.opacity = isDark ? '0' : '0.15';
            document.querySelector('.scan-line').style.opacity = isDark ? '0' : '0.4';
            document.querySelectorAll('.data-stream').forEach(d => d.style.opacity = isDark ? '0' : '0.3');
        };

        window.showToast = (msg) => {
            const t = document.createElement('div');
            t.style.cssText = "position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(10,10,15,0.95); color:#00ff41; padding:10px 20px; border-radius:4px; z-index:99999; font-size:0.8rem; white-space:nowrap; border:1px solid #00ff41; box-shadow:0 0 15px rgba(0,255,65,0.3); font-family:'Share Tech Mono',monospace;";
            t.innerText = '> ' + msg;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 2000);
        };
    </script>
